<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go 并发实战：迷你农场</title>
    <!-- 引入 Tailwind CSS 进行快速样式开发 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 进行响应式数据绑定 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .card-enter-active, .card-leave-active { transition: all 0.5s ease; }
        .card-enter-from, .card-leave-to { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>
    <div id="app" class="container mx-auto p-6 max-w-6xl">
        <!-- 头部标题区 -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-green-700 mb-2">🌱 Go Context & Channel 迷你农场</h1>
            <p class="text-gray-600">体验并发控制：30秒超时机制 (Context) 与 异步动作流转 (Channel)</p>
        </header>

        <!-- 播种控制台 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 flex items-center justify-center space-x-4">
            <input 
                v-model="newPlantType" 
                type="text" 
                placeholder="输入你想种的蔬菜 (例如: 大白菜)" 
                class="border border-gray-300 rounded-lg px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-green-500"
                @keyup.enter="plantVegetable"
            >
            <button 
                @click="plantVegetable" 
                :disabled="!newPlantType"
                class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
                🚜 播种
            </button>
            <button 
                @click="fetchStatus" 
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition-colors ml-4 text-sm"
            >
                🔄 手动刷新
            </button>
        </div>

        <!-- 农田展示区 -->
        <div v-if="plants.length === 0" class="text-center text-gray-500 py-12 bg-white rounded-xl shadow-sm border border-dashed border-gray-300">
            农田空空如也，快去播种吧！
        </div>

        <transition-group name="card" tag="div" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div 
                v-for="plant in plants" 
                :key="plant.id" 
                class="bg-white rounded-xl shadow-lg border-t-4 overflow-hidden flex flex-col transition-all duration-300 hover:shadow-xl"
                :class="getCardBorderColor(plant.state)"
            >
                <!-- 卡片头部 -->
                <div class="p-4 border-b border-gray-100 flex justify-between items-center" :class="getHeaderBgColor(plant.state)">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">{{ getEmoji(plant.type) }}</span>
                        <h3 class="font-bold text-lg text-gray-800">{{ plant.type }}</h3>
                    </div>
                    <span class="text-xs text-gray-500 font-mono bg-white bg-opacity-50 px-2 py-1 rounded">
                        {{ plant.id.substring(0, 6) }}
                    </span>
                </div>

                <!-- 状态展示 -->
                <div class="p-4 flex-grow flex flex-col justify-center items-center py-6">
                    <span 
                        class="px-4 py-2 rounded-full text-sm font-bold mb-2 shadow-sm"
                        :class="getStateBadgeClass(plant.state)"
                    >
                        {{ plant.state }}
                    </span>
                    <p v-if="isActiveState(plant.state)" class="text-xs text-gray-500 mt-2 animate-pulse">
                        ⏳ 30秒倒计时中...
                    </p>
                    <p v-else-if="plant.state === '已枯死'" class="text-xs text-red-500 mt-2">
                        💀 Context 已超时取消
                    </p>
                    <p v-else-if="plant.state === '已收获'" class="text-xs text-green-600 mt-2 font-bold">
                        🎉 成功走完生命周期
                    </p>
                </div>

                <!-- 操作按钮区 -->
                <div class="p-3 bg-gray-50 grid grid-cols-2 gap-2 border-t border-gray-100">
                    <button 
                        @click="doAction(plant.id, '浇水')" 
                        :disabled="plant.state !== '等待浇水'"
                        class="action-btn bg-blue-100 text-blue-700 hover:bg-blue-200"
                    >
                        💧 浇水
                    </button>
                    <button 
                        @click="doAction(plant.id, '除草虫')" 
                        :disabled="plant.state !== '等待除草虫'"
                        class="action-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200"
                    >
                        🐛 除草虫
                    </button>
                    <button 
                        @click="doAction(plant.id, '施肥')" 
                        :disabled="plant.state !== '等待施肥'"
                        class="action-btn bg-orange-100 text-orange-700 hover:bg-orange-200"
                    >
                        💩 施肥
                    </button>
                    <button 
                        @click="doAction(plant.id, '收获')" 
                        :disabled="plant.state !== '等待收获'"
                        class="action-btn bg-green-100 text-green-700 hover:bg-green-200 font-bold"
                    >
                        🧺 收获
                    </button>
                </div>
            </div>
        </transition-group>
    </div>

    <style>
        .action-btn {
            @apply py-2 px-1 rounded-md text-sm transition-all duration-200 font-medium;
        }
        .action-btn:disabled {
            @apply opacity-40 cursor-not-allowed bg-gray-100 text-gray-400 hover:bg-gray-100;
        }
    </style>

    <script>
        const { createApp, ref, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const plants = ref([]);
                const newPlantType = ref('');
                let pollTimer = null;

                // 获取农场状态
                const fetchStatus = async () => {
                    try {
                        const response = await fetch('/api/farm/status');
                        const data = await response.json();
                        // 根据状态排序，活跃的在前面，死掉的在后面
                        plants.value = (data.plants || []).sort((a, b) => {
                            if (a.state === '已枯死' && b.state !== '已枯死') return 1;
                            if (a.state !== '已枯死' && b.state === '已枯死') return -1;
                            return 0;
                        });
                    } catch (error) {
                        console.error("获取状态失败:", error);
                    }
                };

                // 播种
                const plantVegetable = async () => {
                    if (!newPlantType.value.trim()) return;
                    
                    try {
                        const response = await fetch('/api/farm/plant', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ type: newPlantType.value.trim() })
                        });
                        
                        if (response.ok) {
                            newPlantType.value = ''; // 清空输入框
                            await fetchStatus(); // 立即刷新
                        } else {
                            const err = await response.json();
                            alert("播种失败: " + err.error);
                        }
                    } catch (error) {
                        console.error("播种请求异常:", error);
                    }
                };

                // 执行动作
                const doAction = async (id, actionName) => {
                    try {
                        const response = await fetch('/api/farm/action', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: id, action: actionName })
                        });
                        
                        const result = await response.json();
                        if (!response.ok) {
                            // 演示后端拦截：由于我们前端做了 disabled 控制，一般不会触发这个，
                            // 除非你在倒计时最后一秒点击，后端刚好超时变状态了。
                            alert("操作被后端拦截: \n" + (result.error || "未知错误"));
                        }
                        
                        // 操作后立即刷新状态，让 UI 立刻反应
                        await fetchStatus();
                    } catch (error) {
                        console.error("操作请求异常:", error);
                    }
                };

                // 生命周期钩子
                onMounted(() => {
                    fetchStatus();
                    // 开启 1.5 秒轮询，实时展现后端的 Context 超时效果
                    pollTimer = setInterval(fetchStatus, 1500);
                });

                onUnmounted(() => {
                    if (pollTimer) clearInterval(pollTimer);
                });

                // ---- UI 辅助方法 ----

                const isActiveState = (state) => {
                    return ['等待浇水', '等待除草虫', '等待施肥', '等待收获'].includes(state);
                };

                const getEmoji = (type) => {
                    if (type.includes('白菜')) return '🥬';
                    if (type.includes('萝卜')) return '萝卜';
                    if (type.includes('西瓜')) return '🍉';
                    if (type.includes('草莓')) return '🍓';
                    if (type.includes('玉米')) return '🌽';
                    if (type.includes('番茄') || type.includes('西红柿')) return '🍅';
                    if (type.includes('茄子')) return '🍆';
                    if (type.includes('土豆')) return '🥔';
                    return '🌱';
                };

                const getCardBorderColor = (state) => {
                    switch (state) {
                        case '等待浇水': return 'border-blue-400';
                        case '等待除草虫': return 'border-yellow-400';
                        case '等待施肥': return 'border-orange-400';
                        case '等待收获': return 'border-green-400';
                        case '已收获': return 'border-green-600 opacity-80';
                        case '已枯死': return 'border-gray-400 opacity-60 grayscale';
                        default: return 'border-gray-200';
                    }
                };

                const getHeaderBgColor = (state) => {
                    if (state === '已枯死') return 'bg-gray-100';
                    if (state === '已收获') return 'bg-green-50';
                    return 'bg-white';
                };

                const getStateBadgeClass = (state) => {
                    switch (state) {
                        case '等待浇水': return 'bg-blue-100 text-blue-800 border border-blue-200';
                        case '等待除草虫': return 'bg-yellow-100 text-yellow-800 border border-yellow-200';
                        case '等待施肥': return 'bg-orange-100 text-orange-800 border border-orange-200';
                        case '等待收获': return 'bg-green-100 text-green-800 border border-green-200';
                        case '已收获': return 'bg-green-500 text-white shadow-md';
                        case '已枯死': return 'bg-gray-500 text-white';
                        default: return 'bg-gray-100 text-gray-800';
                    }
                };

                return {
                    plants,
                    newPlantType,
                    plantVegetable,
                    doAction,
                    fetchStatus,
                    getEmoji,
                    getCardBorderColor,
                    getHeaderBgColor,
                    getStateBadgeClass,
                    isActiveState
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
